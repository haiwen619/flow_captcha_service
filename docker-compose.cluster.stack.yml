services:
  flow-captcha-redis:
    image: redis:7-alpine
    container_name: flow-captcha-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  flow-captcha-master:
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: flow-captcha-master
    depends_on:
      flow-captcha-redis:
        condition: service_healthy
    ports:
      - "8060:8060"
    environment:
      - FCS_SERVER_HOST=0.0.0.0
      - FCS_SERVER_PORT=8060
      - FCS_CONFIG_FILE=/app/data/setting.toml
      - FCS_CLUSTER_ROLE=master
      - FCS_NODE_NAME=${FCS_MASTER_NODE_NAME:-master-1}
      - FCS_LOG_LEVEL=${FCS_LOG_LEVEL:-INFO}
      - FCS_LOG_STORAGE_BACKEND=${FCS_LOG_STORAGE_BACKEND:-redis}
      - FCS_LOG_REDIS_URL=${FCS_LOG_REDIS_URL:-redis://flow-captcha-redis:6379/0}
      - FCS_LOG_REDIS_KEY_PREFIX=${FCS_LOG_REDIS_KEY_PREFIX:-fcs}
      - FCS_LOG_REDIS_MAX_ENTRIES=${FCS_LOG_REDIS_MAX_ENTRIES:-20000}
      - FCS_LOG_STARTUP_CLEAR_ON_BOOT=${FCS_LOG_STARTUP_CLEAR_ON_BOOT:-true}
    volumes:
      - ./data/master:/app/data
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8060/api/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  flow-captcha-subnode:
    build:
      context: .
      dockerfile: Dockerfile.headed
    container_name: flow-captcha-subnode
    depends_on:
      flow-captcha-master:
        condition: service_healthy
    ports:
      - "8061:8060"
    environment:
      - ALLOW_DOCKER_HEADED_CAPTCHA=true
      - DISPLAY=:99
      - XVFB_WHD=1920x1080x24
      - FCS_SERVER_HOST=0.0.0.0
      - FCS_SERVER_PORT=8060
      - FCS_CLUSTER_ROLE=subnode
      - FCS_NODE_NAME=${FCS_SUBNODE_NODE_NAME:-subnode-1}
      - FCS_CLUSTER_MASTER_BASE_URL=${FCS_CLUSTER_MASTER_BASE_URL:-http://flow-captcha-master:8060}
      - FCS_CLUSTER_MASTER_CLUSTER_KEY=${FCS_CLUSTER_MASTER_CLUSTER_KEY:-replace-with-master-cluster-key}
      - FCS_CLUSTER_NODE_PUBLIC_BASE_URL=${FCS_CLUSTER_NODE_PUBLIC_BASE_URL:-http://flow-captcha-subnode:8060}
      - FCS_CLUSTER_NODE_API_KEY=${FCS_CLUSTER_NODE_API_KEY:-replace-with-node-internal-key}
      - FCS_CLUSTER_NODE_WEIGHT=${FCS_CLUSTER_NODE_WEIGHT:-100}
      - FCS_CLUSTER_NODE_MAX_CONCURRENCY=${FCS_CLUSTER_NODE_MAX_CONCURRENCY:-0}
      - FCS_CLUSTER_HEARTBEAT_INTERVAL_SECONDS=${FCS_CLUSTER_HEARTBEAT_INTERVAL_SECONDS:-15}
    volumes:
      - ./data/subnode:/app/data
      - ./config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "xdpyinfo -display ${DISPLAY:-:99} >/dev/null 2>&1 && curl -fsS http://127.0.0.1:8060/api/v1/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
